name: Daily ML Digest
on:
  schedule:
    - cron: '0 21 * * *'  # 9 PM UTC — after arxiv updates (~8 PM UTC)
  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    # CPU inference is slow; allow up to 5.5h (the runner caps at 6h).
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and sync dependencies
        run: pip install uv && uv sync

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-gemma4-e4b-v1

      - name: Start Ollama server
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:11434/api/tags >/dev/null; then
              echo "Ollama is up."; break
            fi
            sleep 1
          done

      - name: Pull Gemma 4 E4B model
        run: ollama pull gemma4:e4b

      - name: Run digest pipeline
        run: uv run python run_pipeline.py --provider ollama --output docs/
        env:
          OLLAMA_MODEL: gemma4:e4b

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "digest: $(date -u +%Y-%m-%d)"
          file_pattern: "docs/**"
