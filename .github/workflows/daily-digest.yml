name: Daily ML Digest
on:
  schedule:
    - cron: '0 21 * * *'  # 9 PM UTC — after arxiv updates (~8 PM UTC)
  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and sync dependencies
        run: pip install uv && uv sync

      - name: Run digest pipeline
        run: uv run python run_pipeline.py --output docs/
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "digest: $(date -u +%Y-%m-%d)"
          file_pattern: "docs/**"
